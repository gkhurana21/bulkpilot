# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "fbd1507f0f9f6e6b7f6d8009f0775f4b"
name = "bulkpilot"
application_url = "https://localhost:3458"
embedded = true

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "write_products"

[webhooks]
api_version = "2026-07"

  # NOTE: app/uninstalled and app/scopes_update subscriptions are disabled while
  # developing with `--use-localhost`, because Shopify rejects localhost webhook
  # URIs (its servers can't reach your machine). Re-enable them when deploying to
  # a publicly reachable URL — the handlers already exist in app/routes/.
  #
  # [[webhooks.subscriptions]]
  # uri = "/webhooks/app/uninstalled"
  # topics = [ "app/uninstalled" ]
  #
  # [[webhooks.subscriptions]]
  # uri = "/webhooks/app/scopes_update"
  # topics = [ "app/scopes_update" ]

[auth]
redirect_urls = [ "https://localhost:3458/auth/callback" ]

[build]
include_config_on_deploy = true
automatically_update_urls_on_dev = true

on: [push, pull_request]

name: CI

jobs:
  CI:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      # don't cancel the whole matrix when one leg fails — fail-fast was hiding
      # which job actually broke and red-X'ing every open PR
      fail-fast: false
      matrix:
        # matches "engines.node": ">=22.12"
        # (@shopify/cli requires node >=22.12.0, so 20.x can't install at all)
        node: [22, 24]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ matrix.node }}

      # NOTE: .gitignore (inherited from the Shopify template) ignores every lockfile,
      # so there is nothing to `npm ci` from and nothing for setup-node to cache.
      # Committing package-lock.json later would enable both; until then, npm install.
      # The template also tested yarn/pnpm, and that pnpm leg is what was failing
      # (ERR_PNPM_UNSUPPORTED_ENGINE) and red-X'ing every open PR.
      - name: Install dependencies
        run: npm install

      # react-router 7 generates types into .react-router/types, so a bare
      # `tsc --noEmit` fails on a fresh checkout.
      # npm run typecheck = react-router typegen && tsc --noEmit
      - name: Run TypeScript type checking
        run: npm run typecheck

      - name: Run ESLint
        run: npm run lint

      - name: Validate Prisma
        run: npx prisma generate && npx prisma validate

      - name: Build application
        run: npm run build
